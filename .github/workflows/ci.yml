name: Build & Release

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the reproducible toolchain image (devkitPPC + pinned libogc2/libfat).
      - name: Build cubiboot-dev image
        run: docker build -t cubiboot-dev - < .ci/Dockerfile

      # ipl.dol: the cubeboot loader (entry/ build copies emu sources + compresses payload).
      - name: Build ipl.dol
        run: docker run --rm -v "$PWD":/work cubiboot-dev bash -lc 'cd entry && make clean && make'

      # apploader.img: Swiss IGR redirect embedding the freshly built cubeboot loader.
      - name: Build apploader.img
        run: docker run --rm -v "$PWD":/work cubiboot-dev bash -lc 'bash /work/.ci/build_apploader.sh'

      - name: Assemble release files
        run: |
          set -e
          mkdir -p dist/swiss/patches
          cp cubeboot/cubeboot.dol dist/ipl.dol
          cp apploader.img         dist/swiss/patches/apploader.img
          # config.ini (byte-exact, no trailing newline)
          printf '[cubeboot]\n\nmenu_grid_type = small_banners' > dist/config.ini
          # EXTRACT_TO_ROOT.zip: extract to the SD card root
          (cd dist && zip -r ../EXTRACT_TO_ROOT.zip ipl.dol config.ini swiss)
          cp EXTRACT_TO_ROOT.zip dist/EXTRACT_TO_ROOT.zip
          ls -la dist dist/swiss/patches

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cubiboot
          path: |
            dist/ipl.dol
            dist/swiss/patches/apploader.img
            dist/config.ini
            dist/EXTRACT_TO_ROOT.zip

      # On a tag push (v*), publish a GitHub Release with the artifacts.
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ipl.dol
            dist/swiss/patches/apploader.img
            dist/config.ini
            dist/EXTRACT_TO_ROOT.zip
