name: Build & Release

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the reproducible toolchain image (devkitPPC + pinned libogc2/libfat).
      # Retry: the Docker Hub base-image pull can hit transient i/o timeouts on runners.
      - name: Build cubiboot-dev image
        run: |
          for i in 1 2 3 4 5; do
            docker build -t cubiboot-dev - < .ci/Dockerfile && exit 0
            echo "docker build attempt $i failed; retrying in 20s..." >&2
            sleep 20
          done
          echo "docker build failed after 5 attempts" >&2
          exit 1

      # ipl.dol: the cubeboot loader (entry/ build copies emu sources + compresses payload).
      - name: Build ipl.dol
        run: docker run --rm -v "$PWD":/work cubiboot-dev bash -lc 'cd entry && make clean && make'

      # apploader.img: Swiss IGR redirect embedding the freshly built cubeboot loader.
      - name: Build apploader.img
        run: docker run --rm -v "$PWD":/work cubiboot-dev bash -lc 'bash /work/.ci/build_apploader.sh'

      # cubiboot.iso: bootable GameCube disc image for GC Loader (El-Torito ISO9660
      # built from cubeboot-tools' gbi.hdr re-branded to the Cubiboot banner + the
      # freshly built cubeboot loader .dol).
      - name: Build cubiboot.iso
        run: docker run --rm -v "$PWD":/work cubiboot-dev bash -lc 'bash /work/.ci/build_iso.sh'

      - name: Assemble release files
        run: |
          set -e
          mkdir -p dist/swiss/patches
          cp cubeboot/cubeboot.dol dist/ipl.dol
          cp apploader.img         dist/swiss/patches/apploader.img
          cp cubiboot.iso          dist/cubiboot.iso
          # config.ini (byte-exact, no trailing newline)
          # default_folder ships commented out so the menu opens at the SD root by default.
          printf '[cubeboot]\n\nmenu_grid_type = small_banners\n\n; Folder the menu opens in at startup. Leave commented for the SD card root.\n; default_folder = /games' > dist/config.ini
          # EXTRACT_TO_ROOT.zip: extract to the SD card root (ipl.dol + config.ini + apploader.img)
          (cd dist && zip -r ../EXTRACT_TO_ROOT.zip ipl.dol config.ini swiss)
          cp EXTRACT_TO_ROOT.zip dist/EXTRACT_TO_ROOT.zip
          ls -la dist dist/swiss/patches

      # cubiboot_picoloader.uf2: PicoLoader firmware with cubiboot.iso embedded as the
      # payload (replicates makeo's PicoLoader converter). Flash directly to the Pico.
      - name: Build cubiboot_picoloader.uf2
        run: |
          set -e
          curl -fsSL -o picoloader.uf2 https://makeo.github.io/PicoLoader/fw/picoloader.uf2
          python3 .ci/make_picoloader_uf2.py picoloader.uf2 dist/cubiboot.iso dist/cubiboot_picoloader.uf2
          ls -la dist/cubiboot_picoloader.uf2

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cubiboot
          path: |
            dist/ipl.dol
            dist/swiss/patches/apploader.img
            dist/config.ini
            dist/cubiboot.iso
            dist/cubiboot_picoloader.uf2
            dist/EXTRACT_TO_ROOT.zip

      # On a tag push (v*), publish a GitHub Release with the artifacts.
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ipl.dol
            dist/swiss/patches/apploader.img
            dist/config.ini
            dist/cubiboot.iso
            dist/cubiboot_picoloader.uf2
            dist/EXTRACT_TO_ROOT.zip
